<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Empire: Crafting Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --neon: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { position: fixed; top: 0; width: 100%; background: #010409; padding: 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; z-index: 1000; }
        .container { padding: 80px 15px; max-width: 600px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: white; margin-top: 10px; }
        .btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        .progress-bar { width: 100%; height: 10px; background: #30363d; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--neon); transition: width 0.1s linear; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #010409; display: flex; border-top: 1px solid #30363d; }
        .nav-btn { flex: 1; padding: 15px; background: none; border: none; color: #8b949e; cursor: pointer; }
        .nav-btn.active { color: var(--neon); border-top: 2px solid var(--neon); }
        .recipe { font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div id="u-name" style="font-family:'Orbitron'; color:var(--neon)">Yükleniyor...</div>
    <div id="u-money" style="font-family:'Orbitron'; color:#f1e05a">0$</div>
</div>

<div class="container">
    <div id="p-mining" class="page active">
        <h3>⛏️ Maden ve Çiftlik (Hammadde)</h3>
        <div class="card">
            <div class="recipe">Ürün: Demir Cevheri | Maliyet: 100$</div>
            <div class="progress-bar"><div id="bar-iron" class="progress-fill"></div></div>
            <button id="btn-iron" class="btn" onclick="work('iron', 'Demir Cevheri', 100, 60000)">Kazmaya Başla (1 Dakika)</button>
        </div>
        <div class="card">
            <div class="recipe">Ürün: Ham Petrol | Maliyet: 250$</div>
            <div class="progress-bar"><div id="bar-oil" class="progress-fill"></div></div>
            <button id="btn-oil" class="btn" onclick="work('oil', 'Ham Petrol', 250, 120000)">Sondajı Başlat (2 Dakika)</button>
        </div>
    </div>

    <div id="p-craft" class="page">
        <h3>🏭 İşleme Fabrikası (Craft)</h3>
        <div class="card">
            <div class="recipe">Gereken: 2x Demir Cevheri | Ürün: Çelik Kiriş</div>
            <div class="progress-bar"><div id="bar-steel" class="progress-fill"></div></div>
            <button id="btn-steel" class="btn" onclick="craft('steel', 'Çelik Kiriş', {'Demir Cevheri': 2}, 180000)">Çelik Ergit (3 Dakika)</button>
        </div>
        <div class="card">
            <div class="recipe">Gereken: 1x Çelik + 1x Petrol | Ürün: Motor</div>
            <div class="progress-bar"><div id="bar-engine" class="progress-fill"></div></div>
            <button id="btn-engine" class="btn" onclick="craft('engine', 'Motor', {'Çelik Kiriş': 1, 'Ham Petrol': 1}, 300000)">Motor Üret (5 Dakika)</button>
        </div>
    </div>

    <div id="p-market" class="page">
        <h3>📦 Envanter ve Satış</h3>
        <div id="inv-list" class="card">Yükleniyor...</div>
        <div class="card">
            <select id="sell-select" style="width:100%; padding:10px; margin-bottom:10px;"></select>
            <button class="btn" style="background:#f1e05a; color:black;" onclick="sell()">SEÇİLİ ÜRÜNÜ SAT</button>
        </div>
    </div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="tab('mining', this)">HAMMADDE</button>
    <button class="nav-btn" onclick="tab('craft', this)">FABRİKA</button>
    <button class="nav-btn" onclick="tab('market', this)">PAZAR</button>
</nav>

<script>
    const sb = supabase.createClient("https://zzqrcxzrfmqmuqlklzzr.supabase.co", "sb_publishable_AupJd7rQfIolZEbK0rZGWw_SFgGmP8z");
    let user = null, profile = null;
    const prices = { "Demir Cevheri": 150, "Ham Petrol": 400, "Çelik Kiriş": 1200, "Motor": 5000 };

    async function init() {
        const { data } = await sb.auth.getUser();
        if (!data.user) return location.reload(); 
        user = data.user;
        sync();
    }

    async function sync() {
        let { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
        profile = data;
        document.getElementById('u-name').innerText = profile.username;
        document.getElementById('u-money').innerText = profile.money.toLocaleString() + "$";
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('inv-list');
        const sel = document.getElementById('sell-select');
        let html = "", opts = "";
        for (let item in profile.inventory) {
            if(profile.inventory[item] > 0) {
                html += `<div>${item}: <b>${profile.inventory[item]}</b></div>`;
                opts += `<option value="${item}">${item} (${prices[item]}$)</option>`;
            }
        }
        list.innerHTML = html || "Envanter boş.";
        sel.innerHTML = opts;
    }

    async function work(id, name, cost, time) {
        if (profile.money < cost) return alert("Para yetersiz!");
        const btn = document.getElementById('btn-' + id);
        const bar = document.getElementById('bar-' + id);
        btn.disabled = true;

        await sb.from('profiles').update({ money: profile.money - cost }).eq('id', user.id);
        profile.money -= cost;
        document.getElementById('u-money').innerText = profile.money + "$";

        animate(bar, time, async () => {
            let inv = {...profile.inventory};
            inv[name] = (inv[name] || 0) + 1;
            await sb.from('profiles').update({ inventory: inv }).eq('id', user.id);
            btn.disabled = false;
            sync();
        });
    }

    async function craft(id, name, reqs, time) {
        for (let r in reqs) {
            if ((profile.inventory[r] || 0) < reqs[r]) return alert(r + " eksik!");
        }
        const btn = document.getElementById('btn-' + id);
        const bar = document.getElementById('bar-' + id);
        btn.disabled = true;

        let inv = {...profile.inventory};
        for (let r in reqs) inv[r] -= reqs[r];
        await sb.from('profiles').update({ inventory: inv }).eq('id', user.id);
        profile.inventory = inv;
        updateUI();

        animate(bar, time, async () => {
            let finalInv = {...profile.inventory};
            finalInv[name] = (finalInv[name] || 0) + 1;
            await sb.from('profiles').update({ inventory: finalInv }).eq('id', user.id);
            btn.disabled = false;
            sync();
        });
    }

    function animate(bar, time, cb) {
        let start = Date.now();
        let t = setInterval(() => {
            let p = ((Date.now() - start) / time) * 100;
            bar.style.width = Math.min(p, 100) + "%";
            if (p >= 100) { clearInterval(t); bar.style.width = "0%"; cb(); }
        }, 100);
    }

    async function sell() {
        const item = document.getElementById('sell-select').value;
        if (!item) return;
        let inv = {...profile.inventory};
        inv[item] -= 1;
        await sb.from('profiles').update({ inventory: inv, money: profile.money + prices[item] }).eq('id', user.id);
        sync();
    }

    function tab(p, b) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('p-' + p).classList.add('active');
        b.classList.add('active');
    }

    init();
</script>
</body>
</html>
