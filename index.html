<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Empire: Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0c10; --card: #161b22; --accent: #238636; --neon: #58a6ff; --gold: #f1e05a; --energy: #ffea00; --tax: #f85149; --tech: #8957e5; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #c9d1d9; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Dashboard */
        .header { position: fixed; top: 0; width: 100%; background: #010409; padding: 10px; border-bottom: 1px solid #30363d; z-index: 1000; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; font-family: 'Orbitron'; font-size: 0.6rem; text-align: center; }
        .container { padding: 85px 15px 20px; max-width: 650px; margin: auto; }
        .page { display: none; } .page.active { display: block; }

        /* Cards & Buttons */
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        h3 { color: var(--neon); font-size: 0.8rem; margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; margin-top: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-work { background: var(--accent); color: white; }
        .btn-buy { background: var(--gold); color: black; }
        .btn-tech { background: var(--tech); color: white; }

        /* Bars */
        .progress-bar { width: 100%; height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .energy-bar { width: 100%; height: 4px; background: #30363d; border-radius: 2px; margin-top: 4px; }
        .energy-fill { height: 100%; background: var(--energy); width: 100%; }

        /* Market */
        .market-item { display: flex; justify-content: space-between; padding: 8px; background: #0d1117; border-radius: 6px; margin-bottom: 5px; font-size: 0.75rem; border-left: 3px solid var(--gold); }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #010409; display: flex; border-top: 1px solid #30363d; z-index: 1000; height: 75px; }
        .nav-btn { flex: 1; padding: 10px; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 0.55rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        .nav-btn.active { color: var(--neon); border-top: 2px solid var(--neon); background: rgba(88, 166, 255, 0.05); }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="header">
        <div style="color:var(--gold)">💰 <span id="h-money">0</span></div>
        <div style="color:var(--energy)">⚡ <span id="h-energy">100</span></div>
        <div style="color:var(--tech)">🧬 <span id="h-tp">0</span></div>
        <div style="color:var(--tax)">📉 <span id="h-tax">0</span></div>
    </div>

    <div class="container">
        <div id="p-prod" class="page active">
            <div class="card">
                <h3>⚡ ENERJİ VE YÖNETİM</h3>
                <div class="energy-bar"><div id="energy-fill" class="energy-fill"></div></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-tech" onclick="upgradeEnergy()">Panel Kur ($5K)</button>
                    <button class="btn" style="background:var(--tax); color:white" onclick="payTax()">Vergi Öde</button>
                </div>
            </div>
            <div id="unit-list"></div>
        </div>

        <div id="p-market" class="page">
            <div class="card">
                <h3>📈 CANLI BORSA (Q-FİYAT)</h3>
                <div id="market-list"></div>
            </div>
            <div class="card">
                <h3>📦 MERKEZ DEPO</h3>
                <div id="inv-list"></div>
            </div>
        </div>

        <div id="p-corp" class="page">
            <div class="card">
                <h3>👥 İK VE İŞ GÜCÜ</h3>
                <p style="font-size:0.7rem">İşçi Sayısı: <b id="c-workers">0</b> (Hız: +%2 per işçi)</p>
                <button class="btn btn-buy" onclick="hireWorker()">İşçi Kirala ($2,500)</button>
            </div>
            <div class="card">
                <h3>🔬 TEKNOLOJİ AĞACI</h3>
                <p style="font-size:0.7rem">Üretimlerden kazandığın🧬 puanları burada harca.</p>
                <button class="btn btn-tech" onclick="buyTech('speed')">Üretim Hızı +%10 (5 TP)</button>
                <button class="btn btn-tech" style="margin-top:5px" onclick="buyTech('energy')">Enerji Max +50 (10 TP)</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="tab('prod', this)">ÜRETİM</button>
        <button class="nav-btn" onclick="tab('market', this)">BORSA</button>
        <button class="nav-btn" onclick="tab('corp', this)">ŞİRKET</button>
    </nav>
</div>

<script>
    const sb = supabase.createClient("https://zzqrcxzrfmqmuqlklzzr.supabase.co", "sb_publishable_AupJd7rQfIolZEbK0rZGWw_SFgGmP8z");
    let me = null, myProfile = null;
    let localEnergy = 100;

    const gameData = {
        units: [
            { id: 'm1', name: 'Bakır Madeni', prod: 'Bakır', time: 30, e: 10, xp: 10, basePrice: 200 },
            { id: 'm2', name: 'Petrol Kuyusu', prod: 'Petrol', time: 60, e: 20, xp: 25, basePrice: 600 },
            { id: 'f1', name: 'Kablo Fabrikası', prod: 'Kablo', time: 120, e: 40, xp: 100, basePrice: 3500, req: {'Bakır': 5} }
        ],
        market: { 'Bakır': 200, 'Petrol': 600, 'Kablo': 3500 }
    };

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if(!user) return; me = user;
        
        sync();
        setInterval(updateMarketPrices, 30000);
        setInterval(energyLoop, 1500);
        setInterval(sync, 15000);
    }

    async function sync() {
        const { data } = await sb.from('profiles').select('*').eq('id', me.id).single();
        myProfile = data;

        document.getElementById('h-money').innerText = data.money.toLocaleString();
        document.getElementById('h-tp').innerText = data.tech_points || 0;
        document.getElementById('h-tax').innerText = (data.tax_debt || 0).toLocaleString();
        document.getElementById('c-workers').innerText = data.worker_count || 1;

        renderUnits();
        renderInventory();
        renderMarket();
    }

    function energyLoop() {
        let max = (myProfile?.energy_level || 1) * 100;
        if(localEnergy < max) localEnergy += 2;
        document.getElementById('h-energy').innerText = localEnergy;
        document.getElementById('energy-fill').style.width = (localEnergy / max * 100) + "%";
    }

    function updateMarketPrices() {
        for(let item in gameData.market) {
            let change = 0.9 + (Math.random() * 0.2); // %90 ile %110 arası dalgalanma
            gameData.market[item] = Math.round(gameData.market[item] * change);
        }
        renderMarket();
    }

    function renderUnits() {
        const div = document.getElementById('unit-list');
        div.innerHTML = gameData.units.map(u => `
            <div class="card">
                <h3>${u.name}</h3>
                <div class="progress-bar"><div id="bar-${u.id}" class="progress-fill"></div></div>
                <button class="btn btn-work" id="btn-${u.id}" onclick="startProduction('${u.id}')">ÜRETİME BAŞLA (⚡${u.e})</button>
            </div>
        `).join('');
    }

    async function startProduction(id) {
        const u = gameData.units.find(x => x.id === id);
        if(localEnergy < u.e) return alert("Enerji yetersiz!");
        if(u.req) {
            for(let r in u.req) if((myProfile.inventory[r] || 0) < u.req[r]) return alert(r + " yetersiz!");
        }

        localEnergy -= u.e;
        const btn = document.getElementById('btn-'+id);
        const bar = document.getElementById('bar-'+id);
        btn.disabled = true;

        let speedBonus = 1 - ((myProfile.worker_count || 1) * 0.02);
        let actualTime = u.time * speedBonus * 1000;

        let start = Date.now();
        let t = setInterval(() => {
            let p = ((Date.now() - start) / actualTime) * 100;
            bar.style.width = Math.min(p, 100) + "%";
            if(p >= 100) {
                clearInterval(t);
                finishProduction(u);
                bar.style.width = "0%";
                btn.disabled = false;
            }
        }, 100);
    }

    async function finishProduction(u) {
        let inv = {...myProfile.inventory};
        if(u.req) for(let r in u.req) inv[r] -= u.req[r];
        inv[u.prod] = (inv[u.prod] || 0) + 1;
        
        await sb.from('profiles').update({ 
            inventory: inv, 
            xp: myProfile.xp + u.xp,
            tech_points: (myProfile.tech_points || 0) + 1,
            tax_debt: (myProfile.tax_debt || 0) + 50 
        }).eq('id', me.id);
        sync();
    }

    function renderInventory() {
        const div = document.getElementById('inv-list');
        let html = "";
        for(let item in myProfile.inventory) {
            let qty = myProfile.inventory[item];
            if(qty > 0) {
                html += `<div class="market-item"><span>${item} (x${qty})</span><button class="btn" style="width:60px; margin:0; background:var(--gold); color:black" onclick="sell('${item}')">SAT</button></div>`;
            }
        }
        div.innerHTML = html || "Depo boş.";
    }

    function renderMarket() {
        const div = document.getElementById('market-list');
        div.innerHTML = Object.entries(gameData.market).map(([name, price]) => `
            <div class="market-item"><span>${name}</span><b>$${price}</b></div>
        `).join('');
    }

    async function sell(item) {
        let price = gameData.market[item] || 100;
        let inv = {...myProfile.inventory};
        inv[item] -= 1;
        await sb.from('profiles').update({ money: myProfile.money + price, inventory: inv }).eq('id', me.id);
        sync();
    }

    async function payTax() {
        if(myProfile.money < myProfile.tax_debt) return alert("Para yetersiz!");
        await sb.from('profiles').update({ money: myProfile.money - myProfile.tax_debt, tax_debt: 0 }).eq('id', me.id);
        sync();
    }

    async function hireWorker() {
        let cost = 2500 * (myProfile.worker_count || 1);
        if(myProfile.money < cost) return alert("Para yetersiz!");
        await sb.from('profiles').update({ money: myProfile.money - cost, worker_count: (myProfile.worker_count || 1) + 1 }).eq('id', me.id);
        sync();
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        btn.classList.add('active');
    }

    init();
</script>
</body>
</html>
