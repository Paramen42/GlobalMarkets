<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMarkets Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; width: 90%; max-width: 400px; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .stat-card { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .market-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 10px; margin: 5px 0; border-radius: 6px; }
    </style>
</head>
<body>

<div id="auth-ui" class="container">
    <h2 style="text-align: center;">GlobalMarkets</h2>
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="password" placeholder="Şifre">
    <button onclick="handleAuth()">Giriş Yap / Kayıt Ol</button>
</div>

<div id="game-ui" class="container hidden">
    <div class="stat-card">
        <div id="user-display" style="font-size: 12px; color: #3b82f6;"></div>
        <div style="font-size: 24px; font-weight: bold;"><span id="balance">0</span> $</div>
    </div>
    <div id="market-section">
        <h3>Online Pazar</h3>
        <div id="market-list"></div>
        <hr style="border-color: #334155;">
        <input type="text" id="item-name" placeholder="Ürün Adı">
        <input type="number" id="item-price" placeholder="Fiyat">
        <button onclick="listOnMarket()" style="background: #10b981;">Pazara Koy</button>
    </div>
    <button onclick="logout()" style="background: #ef4444; margin-top: 10px;">Çıkış Yap</button>
</div>

<script>
    const SUPABASE_URL = "https://zzqrcxzrfmqmuqlklzzr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_AupJd7rQfIolZEbK0rZGWw_SFgGmP8z";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) {
            const { data: regData, error: regError } = await supabaseClient.auth.signUp({ email, password });
            if (regError) return alert(regError.message);
            currentUser = regData.user;
        } else {
            currentUser = data.user;
        }
        initGame();
    }

    async function initGame() {
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('user-display').innerText = currentUser.email;
        loadProfile();
        loadMarket();
    }

    async function loadProfile() {
        let { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
        if (!data) {
            const { data: newData } = await supabaseClient.from('profiles').insert([{ id: currentUser.id, username: currentUser.email.split('@')[0], money: 500 }]).select().single();
            data = newData;
        }
        document.getElementById('balance').innerText = data.money;
    }

    async function loadMarket() {
        const { data } = await supabaseClient.from('global_market').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('market-list');
        list.innerHTML = data && data.length > 0 ? data.map(item => `
            <div class="market-item">
                <span>${item.item_name} (${item.price}$)</span>
                <button style="width:auto; padding:5px;" onclick="alert('Satın alma yakında aktif!')">Al</button>
            </div>
        `).join('') : "Pazar boş.";
    }

    async function listOnMarket() {
        const name = document.getElementById('item-name').value;
        const price = document.getElementById('item-price').value;
        if(!name || !price) return;
        await supabaseClient.from('global_market').insert([{ seller_name: currentUser.email, item_name: name, price: parseInt(price) }]);
        loadMarket();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }
</script>
</body>
</html>
