<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire: Industrial Age</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #3b82f6; --neon: #22d3ee; --gold: #f59e0b; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; }
        .hidden { display: none !important; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px; border-bottom: 2px solid var(--accent); z-index: 1000; }
        .stat-v { display: block; font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1.1rem; }
        .stat-l { font-size: 0.6rem; color: #64748b; font-weight: 800; text-transform: uppercase; }

        /* Main */
        .container { padding: 90px 15px 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards & UI */
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-main { background: var(--accent); color: white; }
        .btn-produce { background: #10b981; color: white; margin-top: 8px; }
        .btn-produce:disabled { background: #334155; cursor: not-allowed; }

        /* Inventory & Factory */
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
        .prog-bg { width: 100%; height: 6px; background: #020617; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .prog-fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* Navbar */
        .navbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #0f172a; border: 1px solid #334155; border-radius: 50px; display: flex; padding: 5px; width: 95%; max-width: 400px; z-index: 1000; }
        .nav-item { flex: 1; background: none; border: none; color: #64748b; padding: 10px; border-radius: 40px; font-weight: 700; font-size: 0.65rem; cursor: pointer; }
        .nav-item.active { background: var(--accent); color: white; }

        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: white; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card" style="width:90%; max-width:350px;">
        <h2 style="text-align:center; font-family:'Orbitron'; color:var(--neon)">EMPIRE LOG</h2>
        <input type="text" id="u-name" placeholder="Kullanıcı Adı (Yeni Kayıt)">
        <input type="email" id="u-mail" placeholder="E-posta">
        <input type="password" id="u-pass" placeholder="Şifre">
        <button class="btn btn-main" onclick="auth()">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="game-ui" class="hidden">
    <div class="header">
        <div style="text-align:center"><span class="stat-l">Bakiye</span><span id="m-val" class="stat-v">0</span></div>
        <div style="text-align:center"><span class="stat-l">XP</span><span id="x-val" class="stat-v" style="color:var(--neon)">0</span></div>
    </div>

    <div class="container">
        <div id="p-market" class="page active">
            <div class="card">
                <h3>📦 Envanterim</h3>
                <div id="inv-list">Yükleniyor...</div>
            </div>
            <div class="card">
                <h3>💰 Ürün Sat</h3>
                <label class="stat-l">Ürün Seç</label>
                <select id="sell-item"></select>
                <label class="stat-l">Adet</label>
                <input type="number" id="sell-qty" value="1" min="1">
                <button class="btn btn-main" onclick="sellItem()">PAZARA GÖNDER (NAKİT AL)</button>
            </div>
        </div>

        <div id="p-factory" class="page">
            <div class="card">
                <h3>🌾 Tarım Tesisi</h3>
                <p style="font-size:0.7rem; color:#94a3b8">Ürün: Buğday | Maliyet: 20$ | Süre: 5s</p>
                <div class="prog-bg"><div id="f1-p" class="prog-fill"></div></div>
                <button id="f1-b" class="btn btn-produce" onclick="produce(1, 'Buğday', 20, 5000)">Üretimi Başlat</button>
            </div>
            <div class="card">
                <h3>⛏️ Demir Madeni</h3>
                <p style="font-size:0.7rem; color:#94a3b8">Ürün: Demir | Maliyet: 100$ | Süre: 15s</p>
                <div class="prog-bg"><div id="f2-p" class="prog-fill"></div></div>
                <button id="f2-b" class="btn btn-produce" onclick="produce(2, 'Demir', 100, 15000)">Üretimi Başlat</button>
            </div>
            <div class="card">
                <h3>💻 Çip Fabrikası</h3>
                <p style="font-size:0.7rem; color:#94a3b8">Ürün: İşlemci | Maliyet: 500$ | Süre: 40s</p>
                <div class="prog-bg"><div id="f3-p" class="prog-fill"></div></div>
                <button id="f3-b" class="btn btn-produce" onclick="produce(3, 'İşlemci', 500, 40000)">Üretimi Başlat</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <button class="nav-item active" onclick="tab('market', this)">PAZAR</button>
        <button class="nav-item" onclick="tab('factory', this)">ÜRETİM</button>
    </div>
</div>

<script>
    const S_URL = "https://zzqrcxzrfmqmuqlklzzr.supabase.co";
    const S_KEY = "sb_publishable_AupJd7rQfIolZEbK0rZGWw_SFgGmP8z";
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = null, profile = null;
    const itemPrices = { "Buğday": 50, "Demir": 250, "İşlemci": 1500 };

    async function auth() {
        const e = document.getElementById('u-mail').value, p = document.getElementById('u-pass').value, u = document.getElementById('u-name').value;
        let { data, error } = await sb.auth.signInWithPassword({email:e, password:p});
        if(error) {
            let { data: d2, error: e2 } = await sb.auth.signUp({email:e, password:p});
            if(e2) return alert(e2.message);
            data = d2;
            await sb.from('profiles').insert([{id: data.user.id, username: u || e.split('@')[0], money: 500, inventory: {}}]);
        }
        user = data.user;
        init();
    }

    async function init() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        sync();
        setInterval(sync, 10000);
    }

    async function sync() {
        let { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
        profile = data;
        document.getElementById('m-val').innerText = profile.money.toLocaleString() + "$";
        document.getElementById('x-val').innerText = profile.xp;
        updateInvUI();
    }

    function updateInvUI() {
        const list = document.getElementById('inv-list'), sel = document.getElementById('sell-item');
        let html = "", opts = "";
        for (let item in profile.inventory) {
            if(profile.inventory[item] > 0) {
                html += `<div class="item-row"><span>${item}</span><b>${profile.inventory[item]} Adet</b></div>`;
                opts += `<option value="${item}">${item} (${itemPrices[item]}$)</option>`;
            }
        }
        list.innerHTML = html || "Envanter boş. Üretime başla!";
        sel.innerHTML = opts || "<option>Ürün Yok</option>";
    }

    function tab(name, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + name).classList.add('active');
        el.classList.add('active');
    }

    async function produce(fid, name, cost, ms) {
        if(profile.money < cost) return alert("Bakiye yetersiz!");
        const b = document.getElementById(`f${fid}-b`), p = document.getElementById(`f${fid}-p`);
        b.disabled = true;
        
        // Parayı düş
        await sb.from('profiles').update({ money: profile.money - cost }).eq('id', user.id);
        profile.money -= cost;
        sync();

        let start = Date.now();
        let t = setInterval(async () => {
            let proc = ((Date.now() - start) / ms) * 100;
            p.style.width = Math.min(proc, 100) + "%";
            if(proc >= 100) {
                clearInterval(t);
                p.style.width = "0%";
                b.disabled = false;
                let inv = {...profile.inventory};
                inv[name] = (inv[name] || 0) + 1;
                await sb.from('profiles').update({ inventory: inv, xp: profile.xp + 10 }).eq('id', user.id);
                sync();
            }
        }, 100);
    }

    async function sellItem() {
        const name = document.getElementById('sell-item').value, qty = parseInt(document.getElementById('sell-qty').value);
        if(!profile.inventory[name] || profile.inventory[name] < qty) return alert("Yetersiz stok!");
        
        let inv = {...profile.inventory};
        inv[name] -= qty;
        let gain = itemPrices[name] * qty;
        
        await sb.from('profiles').update({ inventory: inv, money: profile.money + gain }).eq('id', user.id);
        alert(`${qty} adet ${name} satıldı. +${gain}$`);
        sync();
    }
</script>
</body>
    </html>
