<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMarkets: Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --success: #10b981; --gold: #fbbf24; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Üst Panel */
        .header { position: fixed; top: 0; width: 100%; background: #0f172a; padding: 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-around; z-index: 100; box-sizing: border-box; }
        .stat { text-align: center; }
        .stat-val { display: block; font-weight: 800; color: var(--gold); font-size: 1.1rem; }
        .stat-lab { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }

        /* Ana İçerik */
        .container { padding: 80px 15px 20px; max-width: 600px; margin: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }

        /* Navigasyon */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .nav-btn.active { color: var(--accent); }

        /* Listeler */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #334155; }
        .rank-num { font-weight: bold; color: var(--accent); margin-right: 10px; }

        input, .btn { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; box-sizing: border-box; }
        input { background: #0f172a; color: white; border: 1px solid #334155; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-buy { background: var(--success); color: white; width: auto; padding: 8px 15px; }
    </style>
</head>
<body>

<div id="auth-screen" class="container" style="padding-top: 20px;">
    <div class="card">
        <h1 style="text-align:center">GlobalMarkets</h1>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button class="btn btn-primary" onclick="handleAuth()">Giriş Yap / Kayıt Ol</button>
    </div>
</div>

<div id="main-ui" class="hidden">
    <div class="header">
        <div class="stat"><span class="stat-lab">Bakiye</span><span id="balance" class="stat-val">0</span></div>
        <div class="stat"><span class="stat-lab">Seviye</span><span id="level" class="stat-val" style="color:var(--accent)">1</span></div>
        <div class="stat"><span class="stat-lab">XP</span><span id="xp" class="stat-val" style="color:var(--success)">0</span></div>
    </div>

    <div class="container">
        <div id="page-market" class="page active">
            <div class="card">
                <h3>🛒 Online Pazar</h3>
                <div id="market-list"></div>
                <h4 style="margin-top:20px">İlan Ver</h4>
                <input id="m-name" placeholder="Eşya adı">
                <input type="number" id="m-price" placeholder="Fiyat">
                <button class="btn btn-primary" onclick="listItem()">Pazara Ekle</button>
            </div>
        </div>

        <div id="page-factory" class="page">
            <div class="card">
                <h3>🏗️ Sanayi Bölgesi</h3>
                <div class="list-item">
                    <div><b>Küçük Çiftlik</b><br><small>10$/dk | 1.000$</small></div>
                    <button class="btn-buy" onclick="buyAsset(1000, 10)">İnşa Et</button>
                </div>
                <div class="list-item">
                    <div><b>Demir Madeni</b><br><small>60$/dk | 5.000$</small></div>
                    <button class="btn-buy" onclick="buyAsset(5000, 60)">İnşa Et</button>
                </div>
                <div class="list-item">
                    <div><b>Teknoloji Üssü</b><br><small>300$/dk | 25.000$</small></div>
                    <button class="btn-buy" onclick="buyAsset(25000, 300)">İnşa Et</button>
                </div>
            </div>
        </div>

        <div id="page-leaderboard" class="page">
            <div class="card">
                <h3>🏆 En Zenginler</h3>
                <div id="leader-list"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="showPage('market', this)">PAZAR</button>
        <button class="nav-btn" onclick="showPage('factory', this)">FABRİKA</button>
        <button class="nav-btn" onclick="showPage('leaderboard', this)">LİDERLİK</button>
    </nav>
</div>

<script>
    const SUPABASE_URL = "https://zzqrcxzrfmqmuqlklzzr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_AupJd7rQfIolZEbK0rZGWw_SFgGmP8z";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;

    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        let { data, error } = await sb.auth.signInWithPassword({email:e, password:p});
        if(error) {
            let { data: d2, error: e2 } = await sb.auth.signUp({email:e, password:p});
            if(e2) return alert(e2.message);
            data = d2;
        }
        user = data.user;
        start();
    }

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        btn.classList.add('active');
        if(id === 'leaderboard') loadLeaders();
    }

    async function start() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').classList.remove('hidden');
        await sync();
        setInterval(sync, 10000); 
        loadMarket();
    }

    async function sync() {
        let { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
        if(!data) {
            await sb.from('profiles').insert([{id: user.id, username: user.email.split('@')[0]}]);
            return sync();
        }
        document.getElementById('balance').innerText = data.money.toLocaleString() + "$";
        document.getElementById('level').innerText = data.level;
        document.getElementById('xp').innerText = data.xp;
    }

    async function buyAsset(cost, income) {
        let { data } = await sb.from('profiles').select('money').eq('id', user.id).single();
        if(data.money < cost) return alert("Para yetersiz!");
        await sb.from('profiles').update({ money: data.money - cost, xp: data.xp + 50 }).eq('id', user.id);
        alert("Satın alındı! Geliriniz arttı.");
        sync();
    }

    async function loadMarket() {
        let { data } = await sb.from('global_market').select('*').limit(10).order('created_at', {ascending:false});
        document.getElementById('market-list').innerHTML = data.map(i => `
            <div class="list-item">
                <span>${i.item_name} <br><small>${i.price}$</small></span>
                <button class="btn-buy" onclick="alert('İşlem başarılı!')">Al</button>
            </div>
        `).join('') || "Pazar şu an boş.";
    }

    async function loadLeaders() {
        let { data } = await sb.from('profiles').select('username, money').order('money', {ascending:false}).limit(5);
        document.getElementById('leader-list').innerHTML = data.map((u, i) => `
            <div class="list-item">
                <span><span class="rank-num">#${i+1}</span> ${u.username}</span>
                <span style="color:var(--gold)">${u.money}$</span>
            </div>
        `).join('');
    }

    async function listItem() {
        const n = document.getElementById('m-name').value;
        const p = document.getElementById('m-price').value;
        if(!n || !p) return;
        await sb.from('global_market').insert([{seller_name: user.email, item_name: n, price: parseInt(p)}]);
        loadMarket();
    }
</script>
</body>
</html>
